<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Audio Demo</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <h1 class="text-center mb-5">🎧 Audio Comparison Demo</h1>

    <div class="row g-4">
     <div class="row">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5 class="card-title">Clean</h5>
                    <audio controls class="w-100">
                        <source src="clean.wav" type="audio/wav">
                    </audio>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5 class="card-title">Reverb</h5>
                    <audio controls class="w-100">
                        <source src="reverb.wav" type="audio/wav">
                    </audio>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5 class="card-title">Enhanced</h5>
                    <audio controls class="w-100">
                        <source src="enhanced.wav" type="audio/wav">
                    </audio>
                </div>
            </div>
            <div>
        </div>

    </div>
</div>

</body>
</html>
